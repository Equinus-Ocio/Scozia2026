async function remoteGet(){if(!hasJB())return{};try{const r=await fetch("https://api.jsonbin.io/v3/b/"+JB_BIN+"/latest",{headers:{"X-Master-Key":JB_KEY,"X-Bin-Meta":"false"}});if(r.ok)return await r.json();return{};}catch(err){return{};}}
async function remotePut(o){if(!hasJB())return;try{await fetch("https://api.jsonbin.io/v3/b/"+JB_BIN,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JB_KEY,"X-Bin-Versioning":"false"},body:JSON.stringify(o)});}catch(err){}}
function mrg(a,b){a=a||{};b=b||{};const o={};[...Object.keys(a),...Object.keys(b)].forEach(k=>{if(a[k]||b[k])o[k]=true});return o}
async function load(){const l=JSON.parse(localStorage.getItem(LS)||'{}');const r=await remoteGet();const m=mrg(l,r);localStorage.setItem(LS,JSON.stringify(m));return m}

      tab==='food'&&e('div',null,e('div',{style:{fontSize:12,color:P.muted,marginBottom:12,paddingLeft:4}},'Suggerimenti pranzi e cene · ✓ = già prenotato'),FOOD.map(g=>e(FoodCard,{key:g.giorno,g:g}))),
      tab==='todo'&&e('div',null,
        loading?e('div',{style:{textAlign:'center',color:P.muted,padding:40}},'Caricamento…'):e('div',null,
          e('div',{style:{fontSize:12,color:P.muted,marginBottom:12,paddingLeft:4}},'Tocca per confermare · spunta permanente'),
          e('div',{style:{padding:'14px 16px',borderRadius:12,background:P.card,border:'1px solid '+P.border,marginBottom:18}},
            e('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:8}},e('span',{style:{fontSize:13,color:P.text}},'Completati'),e('span',{style:{fontSize:13,color:P.greenL,fontWeight:700}},tot+'/'+PRENO.length+' ('+pct+'%)')),
            e('div',{style:{height:6,background:P.border,borderRadius:4,overflow:'hidden'}},e('div',{style:{height:'100%',borderRadius:4,background:'linear-gradient(90deg,'+P.green+','+P.greenL+')',width:pct+'%',transition:'width .4s'}}))
          ),
          ['fatto','alta','media','bassa'].map(u=>{
            const items=PRENO.filter(p=>p.u===u);
            if(!items.length)return null;
            const lbls={fatto:'✓ Già confermati',alta:'🔴 Da fare subito',media:'🟡 Entro 2-3 settimane',bassa:'🟢 Con calma'};
            return e('div',{key:u,style:{marginBottom:18}},
              e('div',{style:{fontSize:11,color:P.muted,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:8,paddingLeft:4}},lbls[u]),
              items.map(item=>e(CRow,{key:item.id,item:item,chk:chk,onAsk:setModal}))
            );
          })
        )
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App,null));

</script>
</body>
</html>
